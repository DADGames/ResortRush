<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resort Rush: Tropical Merge</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #game-container { box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>

let State = JSON.parse(localStorage.getItem('resort_rush_pro')) || {
    playerName: "", country: null, coins: 200, unlocked: 0, level: 0, lang: 'en'
};
const save = () => localStorage.setItem('resort_rush_pro', JSON.stringify(State));

// --- ГЛАВНЫЙ КЛАСС ЗАГРУЗКИ ---
class Boot extends Phaser.Scene {
    constructor() { super('Boot'); }
    preload() {
        this.load.json('langData', 'lang.json');
        this.load.image('map_bg', 'assets/map_bg.png');
        this.load.image('level_bg', 'assets/level_bg.png');
        this.load.image('ui_panel', 'assets/ui_panel.png');
        this.load.image('btn_green', 'assets/btn_green.png');
        this.load.image('ara_news', 'assets/ara_news.png');
        this.load.image('mark', 'assets/mark.png');
        this.load.image('lila', 'assets/lila.png');
        this.load.spritesheet('items0', 'assets/spritesheet_reception.png', { frameWidth: 256, frameHeight: 256 });
        this.load.spritesheet('items1', 'assets/spritesheet_room.png', { frameWidth: 256, frameHeight: 256 });
        this.load.spritesheet('items2', 'assets/spritesheet_bar.png', { frameWidth: 256, frameHeight: 256 });
        this.load.spritesheet('icons', 'assets/country_icons.png', { frameWidth: 256, frameHeight: 256 });
    }
    create() {
        const fullLang = this.cache.json.get('langData');
        const userL = navigator.language.substring(0, 2);
        this.game.config.t = fullLang[userL] || fullLang['en'];
        
        if (!State.playerName) this.scene.start('Login');
        else if (!State.country) this.scene.start('Choice');
        else this.scene.start('News');
    }
}

// --- СЦЕНА ЛОГИНА (ВВОД ИМЕНИ) ---
class Login extends Phaser.Scene {
    constructor() { super('Login'); }
    create() {
        this.add.image(180, 320, 'level_bg').setAlpha(0.6);
        this.add.image(180, 320, 'ui_panel').setScale(0.8);
        const t = this.game.config.t;
        this.add.text(180, 220, t.login_title, { color: '#442', fontSize: '24px', fontWeight: 'bold' }).setOrigin(0.5);
        
        let btn = this.add.image(180, 350, 'btn_green').setInteractive().setScale(1.2);
        this.add.text(180, 350, t.btn_login, { color: '#fff' }).setOrigin(0.5);
        
        btn.on('pointerdown', () => {
            let name = prompt(t.btn_login, "Player1");
            if(name) { State.playerName = name; save(); this.scene.start('Choice'); }
        });
    }
}

// --- СЦЕНА ВЫБОРА СТРАНЫ ---
class Choice extends Phaser.Scene {
    constructor() { super('Choice'); }
    create() {
        this.add.image(180, 320, 'map_bg').setAlpha(0.4);
        const t = this.game.config.t;
        this.add.text(180, 80, t.choose_title, { fontSize: '28px', color: '#fff', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5);

        for(let i=0; i<3; i++) {
            let btn = this.add.sprite(180, 220 + i*130, 'icons', i).setInteractive().setScale(0.6);
            btn.on('pointerdown', () => { State.country = i; save(); this.scene.start('News'); });
        }
    }
}

// --- СЦЕНА ГАЗЕТЫ (НОВОСТИ) ---
class News extends Phaser.Scene {
    constructor() { super('News'); }
    create() {
        this.add.rectangle(180, 320, 360, 640, 0xfdf5e6);
        const t = this.game.config.t;
        this.add.image(180, 450, 'ara_news').setScale(0.7);
        this.add.text(180, 80, t.news_title, { color: '#b22', fontSize: '32px', fontWeight: 'bold' }).setOrigin(0.5);
        this.add.text(180, 180, t.headline, { color: '#000', fontSize: '18px', align: 'center', wordWrap: {width: 300} }).setOrigin(0.5);
        
        let btn = this.add.image(180, 580, 'btn_green').setInteractive();
        this.add.text(180, 580, t.btn_play, { color: '#fff' }).setOrigin(0.5);
        btn.on('pointerdown', () => this.scene.start('Game'));
    }
}

// --- ОСНОВНОЙ ГЕЙМПЛЕЙ (МЕРДЖ) ---
class Game extends Phaser.Scene {
    constructor() { super('Game'); }
    create() {
        this.add.image(180, 320, 'level_bg');
        this.items = this.physics.add.group();
        this.canShoot = true;
        const t = this.game.config.t;

        // Показ текущего персонажа
        const chars = ['mark', 'lila', 'ara'];
        this.add.image(60, 100, chars[State.level]).setScale(0.25).setAlpha(0.8);
        
        this.questTxt = this.add.text(180, 40, t.quest_title + " ???", { backgroundColor: '#000', padding: 5 }).setOrigin(0.5);
        this.spawn();

        this.physics.add.collider(this.items, this.items, this.onMerge, null, this);
        this.input.on('pointerdown', () => this.fire());
        
        // Линия проигрыша
        this.add.rectangle(180, 520, 360, 2, 0xff0000);
    }

    spawn() {
        this.nextType = Phaser.Math.Between(0, 1);
        this.preview = this.add.sprite(180, 580, `items${State.level}`, this.nextType).setScale(0.35);
        this.canShoot = true;
    }

    fire() {
        if (!this.canShoot) return;
        this.canShoot = false;
        let b = this.physics.add.sprite(this.preview.x, this.preview.y, `items${State.level}`, this.nextType).setScale(0.35);
        b.type = this.nextType;
        b.setVelocityY(-650);
        b.setCircle(100);
        this.time.delayedCall(800, () => { if(b.active){ b.setVelocity(0); this.items.add(b); this.spawn(); }});
    }

    onMerge(a, b) {
        if (a.type === b.type && a.type < 4) {
            let nt = a.type + 1;
            let nx = (a.x + b.x)/2, ny = (a.y + b.y)/2;
            a.destroy(); b.destroy();
            let n = this.physics.add.sprite(nx, ny, `items${State.level}`, nt).setScale(0.35 + nt*0.05);
            n.type = nt; n.setImmovable(true);
            this.items.add(n);
            
            if(nt === 4) {
                alert(this.game.config.t.win_msg);
                State.level = (State.level + 1) % 3;
                save();
                this.scene.start('News');
            }
        }
    }

    update() {
        if (this.canShoot && this.preview) this.preview.x = Phaser.Math.Clamp(this.input.x, 50, 310);
        this.items.children.iterate(it => {
            if(it && it.y > 520 && it.body.velocity.y === 0) this.scene.restart();
        });
    }
}

// --- КОНФИГУРАЦИЯ ЗАПУСКА ---
const config = {
    type: Phaser.AUTO,
    width: 360,
    height: 640,
    parent: 'game-container',
    physics: { default: 'arcade' },
    scene: [Boot, Login, Choice, News, Game]
};
new Phaser.Game(config);
</script>
</body>
</html>
